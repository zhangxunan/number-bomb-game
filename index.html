<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 数字炸弹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .range-display {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 1.3em;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .range-display.pulse {
            animation: pulse 0.5s ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input[type="number"] {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.2em;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input[type="number"]:focus {
            border-color: #667eea;
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: bold;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .message.hint {
            background: #fff3cd;
            color: #856404;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .message.warning {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffc107;
        }
        
        .stats {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        
        .stats h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            color: #667eea;
            font-weight: bold;
        }
        
        .new-game-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            margin-top: 15px;
            width: 100%;
        }
        
        .hidden {
            display: none;
        }
        
        .emoji {
            font-size: 1.5em;
            margin-right: 5px;
        }
        
        /* 炸弹特效 */
        .bomb-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .bomb-content {
            text-align: center;
            animation: zoomIn 0.5s ease-out;
        }
        
        @keyframes zoomIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        .bomb-emoji {
            font-size: 150px;
            animation: shake 0.5s ease-in-out infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
        
        .bomb-text {
            color: #ff4757;
            font-size: 2.5em;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }
        
        .bomb-number {
            color: #ffa502;
            font-size: 4em;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 30px rgba(255, 165, 2, 0.8);
        }
        
        .bomb-message {
            color: white;
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        
        .bomb-confirm-btn {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            padding: 20px 50px;
            font-size: 1.3em;
            animation: pulse-btn 1s ease-in-out infinite;
        }
        
        @keyframes pulse-btn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 爆炸粒子效果 */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
        }
        
        .feedback-icon {
            font-size: 2em;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        .range-change {
            color: #ff6b81;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 数字炸弹</h1>
        <p class="subtitle">猜中隐藏的数字，避免踩到炸弹！</p>
        
        <div class="range-display" id="rangeDisplay">
            范围：1 - 100
        </div>
        
        <div class="message hint" id="message">
            <span class="emoji">🎮</span> 输入你的猜测，开始游戏！
        </div>
        
        <div class="input-area" id="inputArea">
            <input type="number" id="guessInput" placeholder="输入 1-100 的数字" min="1" max="100">
            <button onclick="makeGuess()">猜！</button>
        </div>
        
        <button class="new-game-btn hidden" id="newGameBtn" onclick="newGame()">
            🔄 再来一局
        </button>
        
        <div class="stats" id="stats">
            <h3>📊 游戏统计</h3>
            <div class="stat-item">
                <span class="stat-label">已猜次数</span>
                <span class="stat-value" id="guessCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">最佳记录</span>
                <span class="stat-value" id="bestRecord">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">平均次数</span>
                <span class="stat-value" id="avgGuesses">-</span>
            </div>
        </div>
    </div>

    <script>
        let bombNumber;
        let minRange = 1;
        let maxRange = 100;
        let guessCount = 0;
        let gameHistory = [];
        let isGameOver = false;

        // 初始化游戏
        function initGame() {
            bombNumber = Math.floor(Math.random() * 100) + 1;
            minRange = 1;
            maxRange = 100;
            guessCount = 0;
            isGameOver = false;
            
            updateRangeDisplay();
            updateStats();
            showMessage('hint', '🎮 输入你的猜测，开始游戏！');
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            document.getElementById('guessInput').focus();
            document.getElementById('inputArea').classList.remove('hidden');
            document.getElementById('newGameBtn').classList.add('hidden');
        }

        // 更新范围显示
        function updateRangeDisplay() {
            const rangeEl = document.getElementById('rangeDisplay');
            rangeEl.textContent = `范围：${minRange} - ${maxRange}`;
            rangeEl.classList.add('pulse');
            setTimeout(() => rangeEl.classList.remove('pulse'), 500);
        }

        // 显示消息
        function showMessage(type, text) {
            const messageEl = document.getElementById('message');
            messageEl.className = `message ${type}`;
            messageEl.innerHTML = text;
        }

        // 更新统计
        function updateStats() {
            document.getElementById('guessCount').textContent = guessCount;
            
            if (gameHistory.length > 0) {
                const best = Math.min(...gameHistory);
                const avg = (gameHistory.reduce((a, b) => a + b, 0) / gameHistory.length).toFixed(1);
                document.getElementById('bestRecord').textContent = best;
                document.getElementById('avgGuesses').textContent = avg;
            }
        }

        // 玩家猜测
        function makeGuess() {
            if (isGameOver) return;
            
            const input = document.getElementById('guessInput');
            const guess = parseInt(input.value);
            
            if (isNaN(guess) || guess < 1 || guess > 100) {
                showMessage('error', '❌ 请输入 1-100 之间的有效数字！');
                return;
            }
            
            if (guess < minRange || guess > maxRange) {
                showMessage('error', `❌ 数字必须在 ${minRange}-${maxRange} 之间！`);
                return;
            }
            
            guessCount++;
            
            if (guess === bombNumber) {
                // 猜中了！显示炸弹特效
                showBombEffect();
            } else if (guess < bombNumber) {
                // 猜小了
                const oldMin = minRange;
                minRange = guess + 1;
                updateRangeDisplay();
                showMessage('warning', `
                    <span class="feedback-icon">📈</span> 
                    <strong>${guess}</strong> 太小了！
                    <br>
                    <span class="range-change">范围缩小到 ${minRange} - ${maxRange}</span>
                `);
                input.value = '';
                input.focus();
            } else {
                // 猜大了
                const oldMax = maxRange;
                maxRange = guess - 1;
                updateRangeDisplay();
                showMessage('warning', `
                    <span class="feedback-icon">📉</span> 
                    <strong>${guess}</strong> 太大了！
                    <br>
                    <span class="range-change">范围缩小到 ${minRange} - ${maxRange}</span>
                `);
                input.value = '';
                input.focus();
            }
        }

        // 显示炸弹特效
        function showBombEffect() {
            isGameOver = true;
            gameHistory.push(guessCount);
            updateStats();
            
            // 创建炸弹遮罩层
            const overlay = document.createElement('div');
            overlay.className = 'bomb-overlay';
            overlay.innerHTML = `
                <div class="bomb-content">
                    <div class="bomb-emoji">💣</div>
                    <div class="bomb-text">BOOM!</div>
                    <div class="bomb-number">${bombNumber}</div>
                    <div class="bomb-message">你用了 ${guessCount} 次猜中炸弹！</div>
                    <button class="bomb-confirm-btn" onclick="closeBombEffect()">💥 确认</button>
                </div>
            `;
            document.body.appendChild(overlay);
            
            // 创建爆炸粒子效果
            createExplosion();
        }

        // 创建爆炸粒子
        function createExplosion() {
            const colors = ['#ff4757', '#ffa502', '#ff6b81', '#ffeaa7', '#fd79a8'];
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.left = centerX + 'px';
                    particle.style.top = centerY + 'px';
                    document.body.appendChild(particle);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 100 + Math.random() * 200;
                    const tx = Math.cos(angle) * velocity;
                    const ty = Math.sin(angle) * velocity;
                    
                    particle.animate([
                        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                        { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                    ], {
                        duration: 1000 + Math.random() * 500,
                        easing: 'cubic-bezier(0, .9, .57, 1)'
                    }).onfinish = () => particle.remove();
                }, i * 20);
            }
        }

        // 关闭炸弹效果
        function closeBombEffect() {
            const overlay = document.querySelector('.bomb-overlay');
            if (overlay) {
                overlay.remove();
            }
            
            // 显示再来一局按钮
            document.getElementById('inputArea').classList.add('hidden');
            document.getElementById('newGameBtn').classList.remove('hidden');
            showMessage('success', `🎉 恭喜！炸弹数字就是 ${bombNumber}！你用了 ${guessCount} 次猜中！`);
        }

        // 新游戏
        function newGame() {
            initGame();
        }

        // 回车键提交
        document.getElementById('guessInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                makeGuess();
            }
        });

        // 游戏开始
        initGame();
    </script>
</body>
</html>
